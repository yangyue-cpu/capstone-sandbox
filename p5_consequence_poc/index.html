<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consequence POC (p5.js)</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: #fff;
      }
      .hint {
        position: fixed;
        left: 12px;
        bottom: 12px;
        font-size: 12px;
        line-height: 1.3;
        opacity: 0.85;
        user-select: none;
        pointer-events: none;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="hint" style="display: none">
      Keys: <code>D</code> = toggle debug hint, <code>C</code> = connect serial, <code>H</code> = headphones on/off, <code>F</code> = fullscreen<br />
      Red button: mouse click, or <code>Space</code> / <code>Enter</code> / <code>F12</code> in states 1–2 (works without canvas focus); serial lines <code>notify_button_press</code>, <code>notify_red_button</code>, <code>button_press</code>, <code>button</code>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="./sketch.js"></script>
  </body>
</html>
